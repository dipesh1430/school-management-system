version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sms_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sms_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/school-saas
      - JWT_SECRET=your_super_secret_jwt_key_here
    depends_on:
      - mongodb
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sms_web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongodb_data:
